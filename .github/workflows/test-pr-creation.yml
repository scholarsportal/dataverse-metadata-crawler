name: Test PR Creation

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  test-pr:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Make a tiny change
        run: |
          echo "Test run: $(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> test-pr.txt

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gha-test-pr-creation
          base: main
          commit-message: "chore: test PR creation"
          title: "Test PR creation from GitHub Actions"
          body: |
            This PR is a test to verify that GitHub Actions can create pull requests in this repository.
          delete-branch: true
